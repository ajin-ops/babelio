services:
  - type: web
    name: babelio-shopify-dashboard
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: "npm start"
    healthCheckPath: /health
    envVars:
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_products,read_orders
      - key: SHOPIFY_API_VERSION
        value: 2026-04
      - key: APP_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
